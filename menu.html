<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu | Minato Sushi</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <img src="assets/logowithwordmark.png" alt="Minato Sushi">
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Accueil</a></li>
                <li><a href="menu.html" class="active">Menu</a></li>
                <li><a href="aboutus.html">À Propos</a></li>
                <li><a href="panier.html">Panier</a></li>
            </ul>
            <div class="nav-right">
                <a href="panier.html" class="cart-icon">
                    🛒 <span class="cart-count" id="cartCount">0</span>
                </a>
            </div>
            <button class="mobile-toggle" aria-label="Menu">
                <span></span><span></span><span></span>
            </button>
        </div>
    </nav>

    <div class="menu-page-layout">
        <!-- Sidebar Categories -->
        <aside class="category-sidebar">
            <h3>Catégories</h3>
            <div id="categoryList">
                <!-- Categories injected by JS -->
            </div>
        </aside>

        <!-- Main Content -->
        <main class="menu-main">
            <div class="menu-header">
                <h1 id="categoryTitle">Plateaux</h1>
                <p>Sélectionnez vos articles et ajoutez-les au panier</p>
            </div>
            <div class="products-grid" id="productsGrid">
                <!-- Products injected by JS -->
            </div>
        </main>
    </div>

    <script src="main.js"></script>
</body>
</html>
